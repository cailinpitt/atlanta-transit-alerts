<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>OG card</title>
    <style>
      :root {
        --red: #ce242b;
        --blue: #0075b2;
        --gold: #d4a723;
        --green: #009d4b;
        --streetcar: #8b5cf6;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        width: 1024px;
        height: 1024px;
        overflow: hidden;
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        background: #f8fafc;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .card {
        width: 1024px;
        height: 538px;
        background:
          linear-gradient(90deg, rgba(206, 36, 43, 0.16), rgba(0, 117, 178, 0.2)),
          radial-gradient(ellipse at top, rgba(212, 167, 35, 0.18), transparent 70%),
          #f8fafc;
        padding: 38px 56px 28px;
        display: flex;
        flex-direction: column;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        background: #e2e8f0;
        color: #475569;
        padding: 5px 12px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        align-self: flex-start;
      }
      .badge .dot {
        width: 7px;
        height: 7px;
        border-radius: 999px;
        background: #ef4444;
        box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.18);
      }
      .body-row {
        display: flex;
        gap: 48px;
        flex: 1;
        margin-top: 18px;
        align-items: flex-start;
      }
      .copy {
        flex: 1;
        min-width: 0;
      }
      .title {
        font-size: 64px;
        line-height: 1;
        font-weight: 800;
        color: #0f172a;
        margin: 0 0 14px;
      }
      .subtitle {
        font-size: 19px;
        line-height: 1.4;
        color: #475569;
        margin: 0;
      }
      .heatmap {
        display: grid;
        grid-template-columns: 58px repeat(12, 1fr);
        gap: 4px;
        align-items: center;
        width: 410px;
        flex-shrink: 0;
      }
      .heatmap .label {
        font-size: 11px;
        font-weight: 700;
        color: #334155;
        text-align: right;
        padding-right: 5px;
      }
      .cell {
        aspect-ratio: 1 / 1;
        border-radius: 3px;
        background: #e2e8f0;
      }
      .footer {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        margin-top: 20px;
      }
      .url {
        font-size: 19px;
        font-weight: 600;
        color: #0f172a;
      }
      .url .scheme {
        color: #94a3b8;
        font-weight: 400;
      }
      .tag {
        font-size: 11px;
        color: #64748b;
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="badge"><span class="dot"></span>Live archive</div>
      <div class="body-row">
        <div class="copy">
          <h1 class="title">Atlanta Transit<br />Alerts</h1>
          <p class="subtitle">
            A public archive of MARTA service alerts and bot-detected disruptions, with a 90-day
            heatmap of incident frequency.
          </p>
        </div>
        <div class="heatmap">
          <div class="label">Red</div>
          <div class="cell"></div><div class="cell"></div><div class="cell" style="background: var(--red); opacity: 0.55;"></div><div class="cell"></div><div class="cell" style="background: var(--red); opacity: 0.95;"></div><div class="cell" style="background: var(--red); opacity: 0.45;"></div><div class="cell"></div><div class="cell" style="background: var(--red); opacity: 0.85;"></div><div class="cell"></div><div class="cell" style="background: var(--red); opacity: 0.7;"></div><div class="cell" style="background: var(--red); opacity: 0.5;"></div><div class="cell"></div>
          <div class="label">Blue</div>
          <div class="cell" style="background: var(--blue); opacity: 0.7;"></div><div class="cell" style="background: var(--blue); opacity: 0.95;"></div><div class="cell"></div><div class="cell" style="background: var(--blue); opacity: 0.6;"></div><div class="cell" style="background: var(--blue); opacity: 0.85;"></div><div class="cell"></div><div class="cell" style="background: var(--blue); opacity: 0.5;"></div><div class="cell" style="background: var(--blue); opacity: 0.9;"></div><div class="cell"></div><div class="cell" style="background: var(--blue); opacity: 0.65;"></div><div class="cell" style="background: var(--blue); opacity: 0.4;"></div><div class="cell" style="background: var(--blue); opacity: 0.75;"></div>
          <div class="label">Gold</div>
          <div class="cell"></div><div class="cell"></div><div class="cell" style="background: var(--gold); opacity: 0.55;"></div><div class="cell"></div><div class="cell" style="background: var(--gold); opacity: 0.45;"></div><div class="cell"></div><div class="cell"></div><div class="cell" style="background: var(--gold); opacity: 0.6;"></div><div class="cell"></div><div class="cell"></div><div class="cell" style="background: var(--gold); opacity: 0.4;"></div><div class="cell"></div>
          <div class="label">Green</div>
          <div class="cell"></div><div class="cell" style="background: var(--green); opacity: 0.7;"></div><div class="cell"></div><div class="cell"></div><div class="cell" style="background: var(--green); opacity: 0.55;"></div><div class="cell" style="background: var(--green); opacity: 0.4;"></div><div class="cell"></div><div class="cell"></div><div class="cell" style="background: var(--green); opacity: 0.75;"></div><div class="cell"></div><div class="cell" style="background: var(--green); opacity: 0.5;"></div><div class="cell"></div>
          <div class="label">Streetcar</div>
          <div class="cell"></div><div class="cell" style="background: var(--streetcar); opacity: 0.5;"></div><div class="cell"></div><div class="cell"></div><div class="cell" style="background: var(--streetcar); opacity: 0.6;"></div><div class="cell"></div><div class="cell"></div><div class="cell" style="background: var(--streetcar); opacity: 0.45;"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell" style="background: var(--streetcar); opacity: 0.4;"></div>
        </div>
      </div>
      <div class="footer">
        <div class="url"><span class="scheme">https://</span>atlantatransitalerts.app</div>
        <div class="tag">Unofficial · built from public data</div>
      </div>
    </div>
  </body>
</html>
