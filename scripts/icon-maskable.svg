<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Full-bleed background; the OS applies the mask shape, so no rounded
       corners here. Grid sits inside the central ~60% safe zone so it
       survives the circular crop on Android. -->
  <rect width="512" height="512" fill="#0d1117"/>
  <!-- Red row -->
  <rect x="102" y="102" width="56" height="56" rx="14" fill="#ce242b" opacity="0.9"/>
  <rect x="186" y="102" width="56" height="56" rx="14" fill="#30363d"/>
  <rect x="270" y="102" width="56" height="56" rx="14" fill="#ce242b" opacity="0.5"/>
  <rect x="354" y="102" width="56" height="56" rx="14" fill="#30363d"/>
  <!-- Gold row -->
  <rect x="102" y="186" width="56" height="56" rx="14" fill="#30363d"/>
  <rect x="186" y="186" width="56" height="56" rx="14" fill="#d4a723" opacity="0.7"/>
  <rect x="270" y="186" width="56" height="56" rx="14" fill="#30363d"/>
  <rect x="354" y="186" width="56" height="56" rx="14" fill="#d4a723" opacity="0.45"/>
  <!-- Blue row -->
  <rect x="102" y="270" width="56" height="56" rx="14" fill="#0075b2" opacity="0.55"/>
  <rect x="186" y="270" width="56" height="56" rx="14" fill="#30363d"/>
  <rect x="270" y="270" width="56" height="56" rx="14" fill="#0075b2" opacity="0.9"/>
  <rect x="354" y="270" width="56" height="56" rx="14" fill="#30363d"/>
  <!-- Green row -->
  <rect x="102" y="354" width="56" height="56" rx="14" fill="#30363d"/>
  <rect x="186" y="354" width="56" height="56" rx="14" fill="#009d4b" opacity="0.5"/>
  <rect x="270" y="354" width="56" height="56" rx="14" fill="#30363d"/>
  <rect x="354" y="354" width="56" height="56" rx="14" fill="#009d4b" opacity="0.75"/>
</svg>
